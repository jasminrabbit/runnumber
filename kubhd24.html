<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบดึงข้อมูลจากเว็บไซต์ดูซีรีย์  Pro - Multi-Page & Full Episodes</title>
    <style>
        :root { --gold: #ffeb3b; --bg: #0f0f0f; --card: #1e1e1e; --blue: #2196F3; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* ส่วนควบคุมหน้า */
        .control-panel { background: #222; padding: 20px; border-radius: 12px; margin-bottom: 25px; border-top: 4px solid var(--blue); }
        .input-group { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        input { background: #333; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; width: 80px; text-align: center; }
        
        .status-box { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 5px solid var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-title { font-size: 16px; font-weight: bold; color: var(--gold); margin-bottom: 8px; }
        
        button.start-btn { background: var(--blue); color: white; padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button.view-btn { background: #444; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        
        pre { background: #000; color: #00ff41; padding: 10px; font-size: 11px; overflow-x: auto; max-height: 200px; display: none; border-radius: 5px; }
        .badge { background: var(--blue); padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: var(--gold);">สคริปต์ ดึงข้อมูลจาก API จากเว็บที่กำหนด  Multi-Page Parser</h1>
    
    <div class="control-panel">
        <div class="input-group">
            <label>เริ่มจากหน้า:</label>
            <input type="number" id="startPage" value="1" min="1">
            <label>ถึงหน้า:</label>
            <input type="number" id="endPage" value="1" min="1">
            <button class="start-btn" onclick="startHarvesting()">🚀 เริ่มดึงข้อมูล</button>
        </div>
        
        <div class="status-box">
            <div id="loader">📍 พร้อมสำหรับการดึงข้อมูล</div>
            <div id="stats" style="color: #888; font-size: 13px; margin-top: 5px;"></div>
        </div>
    </div>

    <div id="output" class="grid"></div>
</div>

<script>
const PROXY = '/api/proxy-k24hd?url=';
const BASE_CAT = 'https://kubhd24.net/category/watch-series/';

async function request(url, isJson = false) {
    try {
        const res = await fetch(PROXY + encodeURIComponent(url));
        if (!res.ok) return null;
        return isJson ? await res.json() : await res.text();
    } catch (e) { return null; }
}

async function getStream(postId) {
    const json = await request(`https://kubhd24.net/wp-admin/admin-ajax.php?action=mix_get_player&post_id=${postId}`, true);
    if (!json?.success) return null;
    const match = json.player.match(/data-src="([^"]+)"/);
    if (!match) return null;
    return `https://media.vdohls.com/${match[1].split('/').pop()}/playlist.m3u8`;
}

async function parseSeries(id) {
    const html = await request(`https://kubhd24.net/series/${id}/`);
    if (!html) return null;
    const doc = new DOMParser().parseFromString(html, "text/html");
    const title = doc.querySelector("h1")?.textContent.trim() || id;
    const poster = doc.querySelector("img.wp-post-image")?.getAttribute("data-src") || doc.querySelector("img.wp-post-image")?.src;
    const epButtons = doc.querySelectorAll("#eplist button.ep");
    
    let episodes = [];
    for (const btn of epButtons) {
        const url = await getStream(btn.id);
        if (url) episodes.push({ title: btn.textContent.trim(), url });
    }
    return { title, poster, episodes };
}

async function startHarvesting() {
    const startPage = parseInt(document.getElementById("startPage").value);
    const endPage = parseInt(document.getElementById("endPage").value);
    const loader = document.getElementById("loader");
    const output = document.getElementById("output");
    const stats = document.getElementById("stats");

    output.innerHTML = ""; // ล้างค่าเก่า
    let totalSeriesFound = 0;

    for (let p = startPage; p <= endPage; p++) {
        const pageUrl = p === 1 ? BASE_CAT : `${BASE_CAT}page/${p}/`;
        loader.textContent = `🔍 กำลังสแกนหน้าหมวดหมู่ที่ ${p}...`;
        
        const catHtml = await request(pageUrl);
        if (!catHtml) continue;

        const regex = /href="https:\/\/kubhd24\.net\/series\/([^"\/]+)\//g;
        const ids = Array.from(new Set([...catHtml.matchAll(regex)].map(m => m[1]))).filter(i => i !== 'series');
        
        totalSeriesFound += ids.length;
        stats.textContent = `กำลังจัดการหน้าที่ ${p} (พบใหม่ ${ids.length} เรื่อง / รวมสะสม ${totalSeriesFound} เรื่อง)`;

        for (let i = 0; i < ids.length; i++) {
            loader.textContent = `⏳ หน้า ${p} | เรื่องที่ ${i+1}/${ids.length}: ${ids[i]}`;
            
            const data = await parseSeries(ids[i]);
            if (data && data.episodes.length > 0) {
                renderCard(data, p);
            }
        }
    }
    loader.textContent = `✅ ดึงข้อมูลสำเร็จ! รวมทั้งหมด ${totalSeriesFound} เรื่อง จากหน้า ${startPage}-${endPage}`;
}

function renderCard(data, pageNum) {
    let m3u = "#EXTM3U\n";
    data.episodes.forEach(ep => {
        m3u += `#EXTINF:-1 tvg-logo="${data.poster}" group-title="${data.title}", ${data.title} - ${ep.title}\n${ep.url}\n`;
    });

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <img src="${data.poster}">
        <div class="card-body">
            <span class="badge">หน้า ${pageNum}</span>
            <div class="card-title">${data.title}</div>
            <div style="font-size:12px; color:#aaa; margin-bottom:10px;">จำนวน ${data.episodes.length} ตอน</div>
            <button class="view-btn" onclick="toggleM3U(this)">📂 แสดง M3U Playlist</button>
            <pre>${m3u}</pre>
        </div>
    `;
    document.getElementById("output").appendChild(card);
}

function toggleM3U(btn) {
    const pre = btn.nextElementSibling;
    pre.style.display = (pre.style.display === 'block') ? 'none' : 'block';
    btn.textContent = (pre.style.display === 'block') ? '✖ ปิด' : '📂 แสดง M3U Playlist';
}
</script>
</body>
</html>
